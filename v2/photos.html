<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Our Wedding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="global.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-sans { font-family: 'Lato', sans-serif; }
    .gallery-grid {
      columns: 2;
      column-gap: 1rem;
    }
    @media (min-width: 768px) {
      .gallery-grid { columns: 3; }
    }
    .gallery-grid img {
      width: 100%;
      margin-bottom: 1rem;
      border-radius: 0.75rem;
      break-inside: avoid;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .gallery-grid img:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #lightbox.active { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 0.5rem;
    }
    /* Upload area */
    .upload-zone {
      border: 2px dashed #e6e6fa;
      transition: border-color 0.3s, background 0.3s;
    }
    .upload-zone.dragover {
      border-color: #5f8670;
      background: rgba(95, 134, 112, 0.05);
    }
  </style>
</head>
<body class="font-sans bg-[#fdfdfd] text-gray-800">

  <div id="nav-placeholder"></div>

  <!-- Header -->
  <section class="max-w-3xl mx-auto pt-20 pb-12 px-6 text-center">
    <span class="text-[#5f8670] text-3xl mb-4 block">📸</span>
    <h1 class="font-serif text-5xl text-[#5f8670] mb-4">Gallery</h1>
    <p class="text-gray-500 italic">Moments captured, memories shared.</p>
  </section>

  <!-- Upload Section -->
  <section class="max-w-xl mx-auto px-6 pb-12">
    <div id="upload-zone" class="upload-zone rounded-2xl p-8 text-center">
      <p class="text-gray-400 mb-2">📷 Got a great photo? Share it with us!</p>
      <p class="text-xs text-gray-300 mb-4">JPEG, PNG, or WebP &middot; 10MB max</p>

      <div class="flex flex-col sm:flex-row gap-3 items-center justify-center mb-4">
        <input type="text" id="uploader-name" placeholder="Your name (optional)"
          class="border border-[#e6e6fa] rounded-full px-4 py-2 text-sm outline-none focus:border-[#5f8670] transition-colors w-full sm:w-auto">
        <label class="inline-block bg-[#5f8670] text-white px-6 py-2 rounded-full text-sm uppercase tracking-widest cursor-pointer hover:shadow-md transition-shadow">
          Choose Photo
          <input type="file" id="photo-input" accept="image/jpeg,image/png,image/webp,image/heic" class="hidden">
        </label>
      </div>

      <!-- Preview -->
      <div id="upload-preview" class="hidden mb-4">
        <img id="preview-img" class="max-h-48 mx-auto rounded-xl shadow-sm">
      </div>

      <button id="upload-btn" class="hidden border border-[#5f8670] text-[#5f8670] px-8 py-2 rounded-full text-sm uppercase tracking-widest hover:bg-[#5f8670] hover:text-white transition-all">
        Upload
      </button>

      <p id="upload-status" class="text-sm mt-4 min-h-[1.5rem]"></p>
    </div>
  </section>

  <hr class="border-[#e6e6fa] max-w-4xl mx-auto mb-12">

  <!-- Gallery Grid -->
  <section class="max-w-5xl mx-auto px-6 pb-20">
    <div id="gallery" class="gallery-grid">
      <p id="gallery-loading" class="text-gray-400 italic text-center col-span-full">Loading gallery...</p>
    </div>
    <p id="gallery-empty" class="hidden text-gray-400 italic text-center py-12">
      No photos yet — be the first to share a memory!
    </p>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // --- GALLERY ---
    async function loadGallery() {
      try {
        const res = await fetch(`${API_BASE}/api/photos/approved`);
        const photos = await res.json();
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('gallery-loading');
        const empty = document.getElementById('gallery-empty');

        loading.remove();

        if (photos.length === 0) {
          empty.classList.remove('hidden');
          return;
        }

        gallery.innerHTML = photos.map(p => `
          <img 
            src="${API_BASE}/api/photos/file/${p.filename}" 
            alt="Photo by ${p.uploader_name}"
            title="Shared by ${p.uploader_name}"
            loading="lazy"
            onclick="openLightbox(this.src)"
          >
        `).join('');
      } catch (err) {
        console.error("Gallery load failed:", err);
        document.getElementById('gallery-loading').textContent = 'Failed to load gallery.';
      }
    }

    // --- LIGHTBOX ---
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    // --- UPLOAD ---
    const photoInput = document.getElementById('photo-input');
    const uploadBtn = document.getElementById('upload-btn');
    const previewDiv = document.getElementById('upload-preview');
    const previewImg = document.getElementById('preview-img');
    const uploadStatus = document.getElementById('upload-status');
    const uploadZone = document.getElementById('upload-zone');
    let selectedFile = null;

    photoInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];
      if (selectedFile) {
        previewImg.src = URL.createObjectURL(selectedFile);
        previewDiv.classList.remove('hidden');
        uploadBtn.classList.remove('hidden');
        uploadStatus.textContent = '';
      }
    });

    // Drag and drop
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        selectedFile = file;
        previewImg.src = URL.createObjectURL(file);
        previewDiv.classList.remove('hidden');
        uploadBtn.classList.remove('hidden');
        uploadStatus.textContent = '';
      }
    });

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading...';
      uploadStatus.textContent = '';
      uploadStatus.className = 'text-sm mt-4 min-h-[1.5rem]';

      const formData = new FormData();
      formData.append('photo', selectedFile);
      formData.append('name', document.getElementById('uploader-name').value.trim() || 'Anonymous');

      try {
        const res = await fetch(`${API_BASE}/api/photos/upload`, {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          uploadStatus.textContent = "Photo uploaded! It will appear once reviewed. 🌿";
          uploadStatus.classList.add('text-[#5f8670]');
          selectedFile = null;
          photoInput.value = '';
          previewDiv.classList.add('hidden');
          uploadBtn.classList.add('hidden');
        } else {
          const err = await res.json();
          uploadStatus.textContent = err.error || 'Upload failed.';
          uploadStatus.classList.add('text-red-500');
        }
      } catch (err) {
        uploadStatus.textContent = 'Network error. Please try again.';
        uploadStatus.classList.add('text-red-500');
      }

      uploadBtn.disabled = false;
      uploadBtn.textContent = 'UPLOAD';
    });

    // Load gallery on page ready
    document.addEventListener('DOMContentLoaded', loadGallery);
  </script>
</body>
</html>
