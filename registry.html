<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registry | Our Wedding</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="global.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-sans { font-family: 'Lato', sans-serif; }
  </style>
</head>
<body class="font-sans bg-[#fdfdfd] text-gray-800">

  <div id="nav-placeholder"></div>

  <main class="max-w-3xl mx-auto py-32 px-6 text-center">
    <span class="text-[#5f8670] text-4xl mb-6 block">🎁</span>
    <h1 class="font-serif text-5xl text-[#5f8670] mb-6">Registry</h1>
    <p class="text-gray-500 text-lg leading-relaxed max-w-xl mx-auto mb-10">
      Your presence at our wedding is all we really ask for! But if you'd like to celebrate with a gift, 
      we've registered at Vermont Kitchen Supply.
    </p>

    <a href="https://www.vermontkitchensupply.com/apps/giftregistry/registry/431677" target="_blank" rel="noopener"
      class="inline-block bg-[#5f8670] text-white px-10 py-4 rounded-full hover:shadow-lg transition-shadow font-medium tracking-widest uppercase text-sm">
      View Our Registry
    </a>

    <p class="text-gray-400 text-sm italic mt-8">Vermont Kitchen Supply &middot; Manchester, VT</p>
  </main>

</body>
</html>
